name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: The Magic Script (Auto-Generate & Build)
        run: |
          # 1. إنشاء مشروع فلاتر جديد ونظيف يحتوي على مجلد الأندرويد
          flutter create temp_app
          
          # 2. البحث عن ملفاتك ونسخها للمشروع الجديد مهما كان مكانها
          find . -type d -name "temp_app" -prune -o -name "main.dart" -exec cp {} temp_app/lib/ \;
          find . -type d -name "temp_app" -prune -o -name "pubspec.yaml" -exec cp {} temp_app/ \;
          
          # 3. الدخول للمشروع وتثبيت المكتبات والبناء
          cd temp_app
          flutter pub get
          flutter build apk --release
          
          # 4. سحب ملف الـ APK النهائي للخارج لتسهيل تحميله
          cp build/app/outputs/flutter-apk/app-release.apk ../app-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app-release.apk
