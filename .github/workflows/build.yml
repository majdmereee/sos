name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # التعديل هنا: نقوم بتحديد المجلد الفرعي (sos) الذي يحتوي على ملف pubspec.yaml
      - name: Get Dependencies
        run: flutter pub get
        working-directory: ./sos # إذا كان اسم المجلد مختلفاً، استبدل sos باسم مجلدك

      # التعديل هنا أيضاً ليتم البناء داخل المجلد الفرعي
      - name: Build APK
        run: flutter build apk --release
        working-directory: ./sos 

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          # تذكر تعديل المسار هنا ليتضمن اسم المجلد الفرعي أيضاً
          path: sos/build/app/outputs/flutter-apk/app-release.apk
